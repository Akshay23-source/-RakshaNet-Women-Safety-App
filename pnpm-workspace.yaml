packages:
  - '.'
supportedArchitectures:
  os:
    - linux
  cpu:
    - x64
    - arm64
  libc:
    - glibc
# Refuse packages published < 7 days ago, matching the root pnpm-workspace.yaml.
minimumReleaseAge: 10080
minimumReleaseAgeExclude:
  - "@supabase/supabase-js"
  - "@supabase/auth-js"
  - "@supabase/functions-js"
  - "@supabase/node-fetch"
  - "@supabase/postgrest-js"
  - "@supabase/realtime-js"
  - "@supabase/storage-js"
  - "hono"
